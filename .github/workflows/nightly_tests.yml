name: Nightly test of GitHub CI

on:
  workflow_dispatch:
  schedule:
  - cron:  '0 0 * * *'

concurrency:
  group: ${{ github.event_name }}-${{ github.workflow }}-${{ github.ref }}

env:
  COMPILE_JOBS: 4
  PROJECT_NAME: MeltPoolDG-dev

jobs:
  build:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    name: Build ${{ matrix.build_type }}-dealii:${{ matrix.dealii_version }}-${{ matrix.adaflo }}
    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix:
        build_type: ["Release", "Debug"]
        dealii_version: ["master"]
        adaflo: ["adaflo=on", "adaflo=off"]
        exclude:
          - build_type: "Debug"
            adaflo: "adaflo=off"

    container:
      image: dealii/dealii:${{ matrix.dealii_version }}-noble
      options: --user root -v /tmp/ssh-agent
      env:
        SSH_AUTH_SOCK: /tmp/ssh-agent

    steps:
      - uses: actions/checkout@v4

      - name: Clear stale SSH socket
        run: rm -f /tmp/ssh-agent

      - name: Setup SSH Keys
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.APPLICATION_DEV_PRIVATE_KEY }}
          ssh-auth-sock: /tmp/ssh-agent

      - name: Compile adaflo
        if: matrix.adaflo == 'adaflo=on'
        run: |
          git clone https://github.com/MeltPoolDG/adaflo.git
          mkdir adaflo-build
          cd adaflo-build
          cmake \
            -D CMAKE_CXX_STANDARD=20 \
            -D BUILD_SHARED_LIBS=ON \
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            ../adaflo
          make -j${{ env.COMPILE_JOBS }} adaflo

      - name: Compile MeltPoolDG
        run: |
          git clone git@github.com:tum-sam/applications-dev.git
          mkdir build
          cd build
          cmake \
            -D CMAKE_CXX_STANDARD=20 \
            -D CMAKE_CXX_FLAGS="-Werror" \
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -D ADAFLO_LIB=/__w/${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}/adaflo-build/ \
            -D ADAFLO_INCLUDE=/__w/${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}/adaflo/include/ \
            ..
          make -j${{ env.COMPILE_JOBS }}

      - name: Run ctest
        if: matrix.adaflo == 'adaflo=on'
        run: |
          export HWLOC_HIDE_ERRORS=2
          export OMPI_ALLOW_RUN_AS_ROOT=1
          export OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
          cd build
          ctest -j${{ env.COMPILE_JOBS }} --output-on-failure

      - name: Failed test log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: |
            build/tests/**/*output*
            build/tests/**/*stdout*
            build/unit_tests/**/*output*
            build/unit_tests/**/*stdout*
