name: Pull request run of GitHub CI

on:
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened, labeled ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

env:
  COMPILE_JOBS: 4
  PROJECT_NAME: MeltPoolDG-dev

jobs:
  build:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'ready to test') }}
    name: Build ${{ matrix.build_type }}-dealii:${{ matrix.dealii_version }}-${{ matrix.adaflo }}
    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix:
        build_type: ["Release"]
        dealii_version: ["master"]
        adaflo: ["adaflo=on"]

    container:
      image: dealii/dealii:${{ matrix.dealii_version }}-jammy
      options: --user root

    steps:
      - uses: actions/checkout@v4
      - name: Determine test command
        id: test_command
        run: |
          LABELS=$(jq -r '.pull_request.labels[].name' <<< '${{ toJson(github.event.pull_request.labels) }}')
          
          TEST_FILTER=""
          if echo "$LABELS" | grep -q "mp-compressible-flow"; then
            TEST_FILTER+="mp-compressible-flow|"
          fi
          if echo "$LABELS" | grep -q "another-label"; then
            TEST_FILTER+="another-test-folder|"
          fi
          if echo "$LABELS" | grep -q "yet-another-label"; then
            TEST_FILTER+="yet-another-folder|"
          fi
      
          # Remove trailing '|'
          TEST_FILTER=${TEST_FILTER%|}
          
          # Default to running all tests if no filters are set
          if [ -z "$TEST_FILTER" ]; then
            echo "TEST_CMD=ctest -R" >> $GITHUB_ENV
          else
            echo "TEST_CMD=ctest -R \"$TEST_FILTER\"" >> $GITHUB_ENV
          fi
      

      - name: Compile adaflo
        if: matrix.adaflo == 'adaflo=on'
        run: |
          git clone https://github.com/MeltPoolDG/adaflo.git
          mkdir adaflo-build
          cd adaflo-build
          cmake \
            -D CMAKE_CXX_STANDARD=20 \
            -D BUILD_SHARED_LIBS=ON \
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            ../adaflo
          make -j${{ env.COMPILE_JOBS }} adaflo

      - name: Compile MeltPoolDG
        run: |
          mkdir build
          cd build
          cmake \
            -D CMAKE_CXX_STANDARD=20 \
            -D CMAKE_CXX_FLAGS="-Werror" \
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -D ADAFLO_LIB=/__w/${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}/adaflo-build/ \
            -D ADAFLO_INCLUDE=/__w/${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}/adaflo/include/ \
            ..
          make -j${{ env.COMPILE_JOBS }}

      - name: Test
        run: |
          export OMPI_ALLOW_RUN_AS_ROOT=1
          export OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
          cd build
          ${{ env.TEST_CMD }} -j${{ env.COMPILE_JOBS }} --output-on-failure -E 'tests_not_robust/'

      - name: Failed test log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: |
            build/tests/**/*output*
            build/tests/**/*stdout*
            build/unit_tests/**/*output*
            build/unit_tests/**/*stdout*

  clean:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'ready to test') }}
    runs-on: self-hosted
    env:
      ACTIONS_RUNNER_DEBUG: true
      ACTIONS_STEP_DEBUG: true
    steps:
      - name: Prune Docker system
        run: |
          docker system prune -af
