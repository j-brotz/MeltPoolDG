name: Check JSON schema hook

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  precommit: 
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pre-commit
        run: |
          python3 -m pip install --upgrade pip
          pip install pre-commit

      - name: Run create-json-schema hook
        run: |
          pre-commit run create-json-schema --all-files

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "❌ JSON schema is not up-to-date. Please run the hook locally and commit the changes."
            git diff
            exit 1
          fi
