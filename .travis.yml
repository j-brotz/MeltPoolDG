language: cpp

os: linux 

notifications:
  email: false
  # webhooks: https://www.travisbuddy.com/

addons:
  apt:
    packages:
      - docker-ce

services:
  - docker

matrix:
  include:
    - name: Compile and ctest
      stage: build
      env: STEP=compile_and_test

before_script:
  - if [ "$STEP" = "compile_and_test" ]; then
        docker pull dealii/dealii:master-focal;
    fi

script:
  - if [ "$STEP" = "compile_and_test" ]; then
      if [ "$TRAVIS_PULL_REQUEST" == "false" ]; then 
         docker run -i -t dealii/dealii:master-focal /bin/sh -c "git clone https://github.com/kronbichler/adaflo.git && mkdir adaflo-build && cd adaflo-build && cmake -D BUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=Release ../adaflo && make -j2 adaflo && git clone https://github.com/$TRAVIS_REPO_SLUG MeltPoolDG && cd MeltPoolDG && git checkout $TRAVIS_BRANCH && cd .. && mkdir MeltPoolDG-build && cd MeltPoolDG-build && cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-Werror" ../MeltPoolDG -D ADAFLO_LIB=/home/dealii/adaflo-build/ -D ADAFLO_INCLUDE=/home/dealii/adaflo/include/ && make -j2 && ctest -V -R 'unit_tests/|tests/'";
      else
         docker run -i -t dealii/dealii:master-focal /bin/sh -c "git clone https://github.com/kronbichler/adaflo.git && mkdir adaflo-build && cd adaflo-build && cmake -D BUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=Release ../adaflo && make -j2 adaflo && git clone https://github.com/$TRAVIS_PULL_REQUEST_SLUG MeltPoolDG && cd MeltPoolDG && git checkout $TRAVIS_PULL_REQUEST_BRANCH && cd .. && mkdir MeltPoolDG-build && cd MeltPoolDG-build && cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-Werror" ../MeltPoolDG -D ADAFLO_LIB=/home/dealii/adaflo-build/ -D ADAFLO_INCLUDE=/home/dealii/adaflo/include/ && make -j2 && ctest -V -R 'unit_tests/|tests/'";
      fi
    fi
 